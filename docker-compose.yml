services:
  commander-leader:
    hostname: leader
    build: .
    restart: always
    ports:
      - "127.0.0.1:8080:8080"
    extra_hosts:
      - "host.docker.internal:172.18.0.1"
    environment:
      - VINTED_PROXY=socks5://host.docker.internal:1080
    volumes:
      - ./stars.db:/app/stars.db
      - ./sales.db:/app/sales.db
      - ./commander_saas.db:/app/commander_saas.db
      - ./credentials.py:/app/credentials.py
      - ./services/ebay:/app/services/ebay
