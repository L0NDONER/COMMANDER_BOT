<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0a">
<link rel="manifest" href="/manifest.json">
<meta name="description" content="Stop Guessing. Start Profiting. Scan clothing with AI to instantly uncover hidden market value and resale margins.">
<meta property="og:title" content="Flaz">
<meta property="og:description" content="Stop Guessing. Start Profiting. Scan clothing with AI to instantly uncover hidden market value and resale margins.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://flaz.co.uk">
<meta property="og:image" content="https://flaz.co.uk/icons/og-image.png">
<title>Flaz — AI Resale Scanner</title>
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebApplication",
  "name": "Flaz",
  "url": "https://flaz.co.uk",
  "description": "AI-powered resale scanner that photographs clothing and instantly estimates market value, resale margins, and profit potential on resale platforms.",
  "applicationCategory": "BusinessApplication",
  "operatingSystem": "Any",
  "browserRequirements": "Requires a modern browser with camera access",
  "offers": {
    "@type": "Offer",
    "price": "0",
    "priceCurrency": "GBP"
  },
  "featureList": [
    "AI photo recognition of clothing items",
    "Real-time market price lookup",
    "Profit margin and ROI calculation",
    "Buy/pass verdict with confidence rating",
    "Site listing draft generation"
  ],
  "screenshot": "https://flaz.co.uk/icons/icon-512.png",
  "creator": {
    "@type": "Organization",
    "name": "Flaz",
    "url": "https://flaz.co.uk"
  }
}
</script>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, system-ui, sans-serif;
    background: #0a0a0a;
    color: #f5f5f5;
    -webkit-tap-highlight-color: transparent;
  }
  main.app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    height: 100svh;
    padding: env(safe-area-inset-top, 12px) 16px env(safe-area-inset-bottom, 12px);
    overflow: hidden;
    gap: 12px;
  }
  header {
    text-align: center;
    font-weight: 800;
    letter-spacing: 0.4em;
    font-size: 18px;
    padding: 6px 0;
    color: #fafafa;
  }
  .photo {
    flex: 1 1 auto;
    min-height: 0;
    border-radius: 16px;
    background: #161616;
    border: 1px dashed #2a2a2a;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    cursor: pointer;
  }
  .photo .hint {
    color: #aaa;
    text-align: center;
    font-size: 15px;
    line-height: 1.4;
    padding: 24px;
  }
  .photo .hint .big {
    font-size: 48px;
    display: block;
    margin-bottom: 8px;
  }
  .photo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .price {
    display: flex;
    align-items: center;
    background: #161616;
    border-radius: 12px;
    padding: 0 16px;
    height: 56px;
    border: 1px solid #2a2a2a;
  }
  .price .label {
    font-size: 22px;
    color: #999;
    margin-right: 8px;
  }
  .price input {
    flex: 1;
    background: transparent;
    border: 0;
    outline: 0;
    color: #f5f5f5;
    font-size: 22px;
    font-weight: 600;
    -webkit-appearance: none;
    appearance: none;
  }
  .clip {
    font-size: 22px;
    color: #999;
    cursor: pointer;
    padding: 4px;
    transform: rotate(315deg);
    user-select: none;
    line-height: 1;
  }
  .clip:hover { color: #888; }
  .clip.has-photo { color: #4a4; }
  .extras-toggle {
    text-align: center;
    font-size: 26px;
    color: #999;
    cursor: pointer;
    padding: 2px 0;
    user-select: none;
  }
  .extras-toggle:hover { color: #888; }
  .extras-toggle.active { color: #888; }
  .extras-row {
    display: flex;
    gap: 10px;
  }
  .extras-row .price {
    flex: 1;
    height: 46px;
    padding: 0 12px;
    justify-content: center;
  }
  .extras-row .price .label {
    font-size: 16px;
  }
  .extras-row .price input {
    font-size: 16px;
  }
  .total-line {
    text-align: center;
    font-size: 13px;
    color: #888;
    font-weight: 600;
  }
  button.go {
    height: 64px;
    border-radius: 14px;
    border: 0;
    background: #f5f5f5;
    color: #0a0a0a;
    font-size: 20px;
    font-weight: 800;
    letter-spacing: 0.1em;
    cursor: pointer;
  }
  button.go:disabled {
    background: #333;
    color: #aaa;
  }
  .post-buttons {
    display: flex;
    gap: 10px;
  }
  .post-buttons button {
    flex: 1;
    height: 52px;
    border-radius: 14px;
    border: 1px solid #555;
    background: transparent;
    color: #f5f5f5;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.05em;
    cursor: pointer;
  }
  .post-buttons button.log-buy {
    background: #1c3a1c;
    border-color: #3a7a3a;
    color: #eaf6ea;
  }
  .post-buttons button.log-buy.logged {
    background: #333;
    border-color: #555;
    color: #aaa;
  }
  .result {
    border-radius: 14px;
    background: #161616;
    padding: 14px 16px;
    border: 1px solid #2a2a2a;
    font-size: 15px;
    line-height: 1.4;
    min-height: 56px;
    max-height: 40vh;
    max-height: 40svh;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .result.has-listing { justify-content: flex-start; }
  .result.idle { color: #999; align-items: center; }
  .result .verdict { font-weight: 800; font-size: 18px; margin-bottom: 4px; }
  .result .meta { font-size: 13px; opacity: 0.85; }
  .result .listing { margin-top: 12px; display: flex; flex-direction: column; gap: 8px; }
  .result .field {
    background: rgba(0,0,0,0.25);
    border-radius: 8px;
    padding: 8px 10px;
    cursor: pointer;
  }
  .result .field .field-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    opacity: 0.6;
    margin-bottom: 2px;
  }
  .result .field .field-value {
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 13px;
    line-height: 1.35;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .result .field.copied { outline: 1px solid currentColor; }
  .result.strong-buy { background: #144a14; border-color: #2e8a2e; color: #f0fff0; }
  .result.strong-buy .meta { color: #c8e8c8; }
  .result.buy { background: #1c3a1c; border-color: #3a7a3a; color: #eaf6ea; }
  .result.buy .meta { color: #bcd8bc; }
  .result.maybe { background: #3d2f0e; border-color: #8a6a1f; color: #fff2cf; }
  .result.maybe .meta { color: #e2cd95; }
  .result.pass { background: #3a1818; border-color: #8a2e2e; color: #ffd8d8; }
  .result.pass .meta { color: #e0a8a8; }
  .result.err { border-color: #5a2d2d; color: #e88; }
  .hidden { display: none !important; }
  input[type="file"] { display: none; }
</style>
</head>
<body>
<main class="app">
  <header>FLAZ</header>

  <label class="photo" id="photoBox" for="photoInput">
    <div class="hint" id="photoHint">
      <span class="big">+</span>
      Tap to take a photo
    </div>
    <img id="preview" class="hidden" alt="">
    <input type="file" id="photoInput" accept="image/*" capture="environment">
  </label>

  <div class="price">
    <span class="label">£</span>
    <input type="text" inputmode="decimal" id="price" placeholder="buy price">
    <label class="clip" id="clipIcon" for="galleryInput">📎</label>
    <input type="file" id="galleryInput" accept="image/*">
  </div>

  <div class="extras-toggle" id="extrasToggle">+ fees &amp; shipping</div>
  <div class="extras-row hidden" id="extrasRow">
    <div class="price">
      <span class="label">£</span>
      <input type="text" inputmode="decimal" id="fees" placeholder="fees">
    </div>
    <div class="price">
      <span class="label">£</span>
      <input type="text" inputmode="decimal" id="shipping" placeholder="shipping">
    </div>
  </div>
  <div class="total-line hidden" id="totalLine"></div>

  <button class="go" id="go" disabled>GO</button>

  <div class="result idle" id="result">Take a photo, enter a price.</div>
  <div class="post-buttons hidden" id="postButtons">
    <button class="log-buy hidden" id="logBuy">LOG BUY</button>
    <button class="hidden" id="retry">RETRY</button>
    <button id="reprice">RE-PRICE</button>
    <button id="again">SCAN ANOTHER</button>
  </div>
</main>

<script>
const photoInput = document.getElementById('photoInput');
const galleryInput = document.getElementById('galleryInput');
const clipIcon = document.getElementById('clipIcon');
const preview = document.getElementById('preview');
const photoHint = document.getElementById('photoHint');
const priceInput = document.getElementById('price');
const feesInput = document.getElementById('fees');
const shippingInput = document.getElementById('shipping');
const extrasToggle = document.getElementById('extrasToggle');
const extrasRow = document.getElementById('extrasRow');
const totalLine = document.getElementById('totalLine');
const goBtn = document.getElementById('go');
const resultEl = document.getElementById('result');
const postButtons = document.getElementById('postButtons');
const logBuyBtn = document.getElementById('logBuy');
const retryBtn = document.getElementById('retry');
const repriceBtn = document.getElementById('reprice');
const againBtn = document.getElementById('again');

let resizedBlob = null;
let busy = false;
let extrasOpen = false;
let lastPrice = '';
let lastVerdict = null;
let lastPhotoId = null;

function getTotalPrice() {
  const base = parseFloat(priceInput.value) || 0;
  const fees = parseFloat(feesInput.value) || 0;
  const ship = parseFloat(shippingInput.value) || 0;
  return base + fees + ship;
}

function refresh() {
  const p = parseFloat(priceInput.value);
  const ready = !!resizedBlob && priceInput.value.trim() !== '' && p >= 0 && isFinite(p) && !busy;
  goBtn.disabled = !ready;
  const fees = parseFloat(feesInput.value) || 0;
  const ship = parseFloat(shippingInput.value) || 0;
  if (extrasOpen && (fees > 0 || ship > 0) && p >= 0 && isFinite(p)) {
    totalLine.textContent = 'Total: £' + getTotalPrice().toFixed(2);
    totalLine.classList.remove('hidden');
  } else {
    totalLine.classList.add('hidden');
  }
}

priceInput.addEventListener('focus', () => priceInput.select());
priceInput.addEventListener('input', refresh);
feesInput.addEventListener('input', refresh);
shippingInput.addEventListener('input', refresh);

extrasToggle.addEventListener('click', () => {
  extrasOpen = !extrasOpen;
  extrasRow.classList.toggle('hidden', !extrasOpen);
  extrasToggle.classList.toggle('active', extrasOpen);
  extrasToggle.textContent = extrasOpen ? '− fees & shipping' : '+ fees & shipping';
  if (!extrasOpen) {
    feesInput.value = '';
    shippingInput.value = '';
    totalLine.classList.add('hidden');
  }
  refresh();
});

async function loadPhoto(file) {
  resizedBlob = await resizeImage(file, 1024, 0.8);
  if (preview.src) URL.revokeObjectURL(preview.src);
  preview.src = URL.createObjectURL(resizedBlob);
  preview.classList.remove('hidden');
  photoHint.classList.add('hidden');
  clipIcon.classList.add('has-photo');
  refresh();
  priceInput.focus();
}

photoInput.addEventListener('change', async () => {
  const file = photoInput.files && photoInput.files[0];
  if (!file) return;
  try { await loadPhoto(file); } catch (e) { showResult('err', 'Failed to read photo', ''); }
});

galleryInput.addEventListener('change', async () => {
  const file = galleryInput.files && galleryInput.files[0];
  if (!file) return;
  try { await loadPhoto(file); } catch (e) { showResult('err', 'Failed to read photo', ''); }
});

goBtn.addEventListener('click', async () => {
  if (!resizedBlob) return;
  const price = getTotalPrice();
  if (!isFinite(price) || price < 0) return;

  lastPrice = priceInput.value;
  busy = true; refresh();
  goBtn.textContent = 'WORKING…';
  showResult('idle', 'Dispatching agents to the jury…', '');

  const fd = new FormData();
  fd.append('image', resizedBlob, 'photo.jpg');
  fd.append('price', String(price));

  try {
    const res = await fetch('/api/evaluate', { method: 'POST', body: fd });
    const data = await res.json();
    renderVerdict(data, price);
    postButtons.classList.remove('hidden');
  } catch (e) {
    retryBtn.classList.add('hidden');  // network error before a server response — no photo_id to retry with
    showResult('err', 'Network error', String(e));
    postButtons.classList.remove('hidden');
  } finally {
    busy = false;
    goBtn.textContent = 'GO';
    refresh();
  }
});

retryBtn.addEventListener('click', async () => {
  if (!lastPhotoId) return;
  const price = getTotalPrice();
  retryBtn.disabled = true;
  retryBtn.textContent = 'RETRYING…';
  showResult('idle', 'Retrying…', '');

  const fd = new FormData();
  fd.append('photo_id', lastPhotoId);
  fd.append('price', String(price));

  try {
    const res = await fetch('/api/retry', { method: 'POST', body: fd });
    const data = await res.json();
    renderVerdict(data, price);
  } catch (e) {
    showResult('err', 'Network error', String(e));
  } finally {
    retryBtn.disabled = false;
    retryBtn.textContent = 'RETRY';
  }
});

logBuyBtn.addEventListener('click', async () => {
  if (!lastVerdict) return;
  logBuyBtn.disabled = true;
  logBuyBtn.textContent = 'LOGGING…';
  try {
    const fd = new FormData();
    fd.append('query', lastVerdict.query);
    fd.append('buy_price', String(lastVerdict.buyPrice));
    fd.append('median', String(lastVerdict.median));
    fd.append('verdict', lastVerdict.verdict);
    await fetch('/api/log-buy', { method: 'POST', body: fd });
    logBuyBtn.textContent = 'LOGGED';
    logBuyBtn.classList.add('logged');
  } catch (e) {
    logBuyBtn.textContent = 'FAILED';
    logBuyBtn.disabled = false;
  }
});

repriceBtn.addEventListener('click', () => {
  priceInput.value = '';
  feesInput.value = '';
  shippingInput.value = '';
  totalLine.classList.add('hidden');
  logBuyBtn.classList.add('hidden');
  retryBtn.classList.add('hidden');
  resultEl.className = 'result idle';
  resultEl.textContent = 'Same photo — enter a new price.';
  postButtons.classList.add('hidden');
  priceInput.focus();
  refresh();
});

againBtn.addEventListener('click', () => {
  resizedBlob = null;
  photoInput.value = '';
  galleryInput.value = '';
  clipIcon.classList.remove('has-photo');
  if (preview.src) URL.revokeObjectURL(preview.src);
  preview.src = '';
  preview.classList.add('hidden');
  photoHint.classList.remove('hidden');
  priceInput.value = lastPrice;
  feesInput.value = '';
  shippingInput.value = '';
  if (extrasOpen) {
    extrasOpen = false;
    extrasRow.classList.add('hidden');
    extrasToggle.classList.remove('active');
    extrasToggle.textContent = '+ fees & shipping';
    totalLine.classList.add('hidden');
  }
  resultEl.className = 'result idle';
  resultEl.textContent = 'Take a photo, enter a price.';
  postButtons.classList.add('hidden');
  retryBtn.classList.add('hidden');
  lastPhotoId = null;
  refresh();
});

function renderVerdict(data, buyPrice) {
  lastPhotoId = (data && data.photo_id) || null;
  if (!data || data.status !== 'success') {
    // Pipeline died before caching anything (Gemini timeout, eBay fan-out
    // failure) — retry re-runs for free-ish (md5 cache may still help) and
    // is the whole point of keeping the photo. A MAYBE below is a completed
    // run: retrying hits the vision md5 cache and returns the same MAYBE,
    // which just looks broken — so retry is error-only, never offered there.
    retryBtn.classList.toggle('hidden', !lastPhotoId);
    showResult('err', data && data.message ? data.message : 'No verdict', '');
    return;
  }
  retryBtn.classList.add('hidden');
  const net = (data.sell_price_num - buyPrice).toFixed(2);
  const kind = verdictClass(data.verdict);
  if (kind === 'strong-buy' && navigator.vibrate) navigator.vibrate([500, 100, 500]);
  else if (kind === 'buy' && navigator.vibrate) navigator.vibrate(500);
  lastVerdict = { query: data.query, buyPrice, median: data.median, verdict: data.verdict };
  if (kind === 'buy' || kind === 'strong-buy') {
    logBuyBtn.textContent = 'LOG BUY';
    logBuyBtn.classList.remove('logged', 'hidden');
    logBuyBtn.disabled = false;
  } else {
    logBuyBtn.classList.add('hidden');
  }
  showResult(
    kind,
    `${data.verdict} — list ${data.sell_for}`,
    `Median ${data.median_pretty} · Fast ${data.fast_sale} · Net £${net} · ROI ${data.roi}% · ${data.confidence}`,
    { title: data.title, description: data.description, tags: data.tags }
  );
}

function verdictClass(verdict) {
  const v = String(verdict || '').toUpperCase();
  if (v.includes('STRONG')) return 'strong-buy';
  if (v.includes('BUY')) return 'buy';
  if (v.includes('MAYBE')) return 'maybe';
  return 'pass';
}

function showResult(kind, verdict, meta, listing) {
  resultEl.className = 'result ' + kind + (listing ? ' has-listing' : '');
  if (kind === 'idle') {
    resultEl.textContent = verdict;
    return;
  }
  resultEl.innerHTML = '';
  const v = document.createElement('div');
  v.className = 'verdict';
  v.textContent = verdict;
  resultEl.appendChild(v);
  if (meta) {
    const m = document.createElement('div');
    m.className = 'meta';
    m.textContent = meta;
    resultEl.appendChild(m);
  }
  if (listing && (listing.title || listing.description || listing.tags)) {
    const wrap = document.createElement('div');
    wrap.className = 'listing';
    appendField(wrap, 'Title', listing.title);
    appendField(wrap, 'Description', listing.description);
    appendField(wrap, 'Tags', listing.tags);
    resultEl.appendChild(wrap);
  }
}

function appendField(parent, label, value) {
  if (!value) return;
  const f = document.createElement('div');
  f.className = 'field';
  const l = document.createElement('div');
  l.className = 'field-label';
  l.textContent = label + ' — tap to copy';
  const t = document.createElement('div');
  t.className = 'field-value';
  t.textContent = value;
  f.appendChild(l);
  f.appendChild(t);
  f.addEventListener('click', async () => {
    try {
      await navigator.clipboard.writeText(value);
      f.classList.add('copied');
      l.textContent = label + ' — copied!';
      setTimeout(() => {
        f.classList.remove('copied');
        l.textContent = label + ' — tap to copy';
      }, 1200);
    } catch (e) { /* clipboard blocked, ignore */ }
  });
  parent.appendChild(f);
}

async function resizeImage(file, maxEdge, quality) {
  const dataUrl = await new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => resolve(r.result);
    r.onerror = reject;
    r.readAsDataURL(file);
  });

  const img = await new Promise((resolve, reject) => {
    const i = new Image();
    i.onload = () => resolve(i);
    i.onerror = reject;
    i.src = dataUrl;
  });

  let { width, height } = img;
  const scale = Math.min(1, maxEdge / Math.max(width, height));
  width = Math.round(width * scale);
  height = Math.round(height * scale);

  const canvas = document.createElement('canvas');
  canvas.width = width;
  canvas.height = height;
  canvas.getContext('2d').drawImage(img, 0, 0, width, height);

  const blob = await new Promise((resolve) => canvas.toBlob(resolve, 'image/jpeg', quality));
  canvas.width = 0;
  canvas.height = 0;
  return blob;
}
</script>
</body>
</html>
